<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#ffd700"/>
<title>Floppy Bird 🐦</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;overflow:hidden;touch-action:none}
h1{color:#ffd700;font-size:26px;font-weight:900;letter-spacing:3px;text-shadow:0 0 20px #ffd70088;margin-bottom:4px;text-align:center}
.sub{color:#aac4ff;font-size:12px;letter-spacing:1px;margin-bottom:10px;text-align:center}
.scores{display:flex;gap:14px;margin-bottom:10px}
.sbox{background:rgba(255,255,255,.07);border-radius:12px;padding:5px 16px;color:#fff;font-size:16px;font-weight:700;border:1px solid rgba(255,255,255,.15)}
.sbox.cur{background:rgba(255,215,0,.15);color:#ffd700;border-color:rgba(255,215,0,.3)}
canvas{border-radius:18px;box-shadow:0 0 60px rgba(100,180,255,.2),0 20px 60px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.1);display:block;cursor:pointer}
.hint{color:rgba(255,255,255,.3);font-size:11px;margin-top:10px;letter-spacing:1px;text-align:center}
</style>
</head>
<body>
<h1>🐦 FLOPPY BIRD</h1>
<div class="sub">পাইপের ফাঁক দিয়ে উড়ে যাও!</div>
<div class="scores">
  <div class="sbox">🏆 <span id="hi">0</span></div>
  <div class="sbox cur">⭐ <span id="sc">0</span></div>
</div>
<canvas id="c"></canvas>
<div class="hint">SPACE · TAP to fly</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const hiEl=document.getElementById('hi');
const scEl=document.getElementById('sc');
const BASE_W=380,BASE_H=540;
let scale=1,CW,CH;
function resize(){
  const s=Math.min((window.innerWidth-16)/BASE_W,(window.innerHeight-180)/BASE_H,1);
  scale=s;CW=Math.floor(BASE_W*s);CH=Math.floor(BASE_H*s);
  canvas.width=CW;canvas.height=CH;
}
resize();
window.addEventListener('resize',()=>{resize();if(state==='idle')draw();});
const GH=()=>52*scale,PW=()=>52*scale,PG=()=>150*scale,PS=()=>2.8*scale;
const BS=()=>26*scale,BX=()=>72*scale,GR=()=>0.44*scale,JF=()=>-8.2*scale;
let state='idle',bY,bV,bR,pipes,score,hi=0,fr=0,lastT=null;
let clouds=[{x:60,y:45,w:65,sp:0.35},{x:200,y:30,w:48,sp:0.22},{x:310,y:68,w:58,sp:0.28}];
function init(){bY=CH*0.45;bV=0;bR=0;score=0;fr=0;pipes=[mp(CW+50),mp(CW+230),mp(CW+410)];scEl.textContent=0;}
function mp(x){const mn=38*scale,mx=CH-GH()-PG()-48*scale;return{x,tH:Math.random()*(mx-mn)+mn,passed:false};}
function jump(){
  if(state==='idle'){init();state='playing';bV=JF();lastT=null;requestAnimationFrame(loop);}
  else if(state==='playing'){bV=JF();}
  else if(state==='dead'){state='idle';draw();}
}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}});
canvas.addEventListener('pointerdown',e=>{e.preventDefault();jump();});
function loop(ts){
  if(state!=='playing')return;
  if(!lastT)lastT=ts;
  const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;fr++;
  bV+=GR()*dt;bV=Math.max(Math.min(bV,11*scale),-11*scale);
  bY+=bV*dt;bR=Math.min(Math.max(bV*4,-25),70);
  if(bY>=CH-GH()-BS()||bY<=0){die();return;}
  for(let p of pipes){
    p.x-=PS()*dt;
    const m=4*scale;
    if(BX()+BS()-m>p.x&&BX()+m<p.x+PW()){
      if(bY+m<p.tH||bY+BS()-m>p.tH+PG()){die();return;}
    }
    if(!p.passed&&p.x+PW()<BX()){p.passed=true;score++;scEl.textContent=score;}
  }
  pipes=pipes.filter(p=>p.x>-PW()-10);
  while(pipes.length<3||pipes[pipes.length-1].x<CW+180)
    pipes.push(mp((pipes[pipes.length-1]?.x||CW)+215*scale));
  clouds=clouds.map(c=>{let nx=c.x-c.sp*scale;if(nx<-90)nx=CW+40;return{...c,x:nx};});
  draw();requestAnimationFrame(loop);
}
function die(){state='dead';if(score>hi){hi=score;hiEl.textContent=hi;}lastT=null;draw();}
function draw(){
  const sky=ctx.createLinearGradient(0,0,0,CH);
  sky.addColorStop(0,'#5ba3d9');sky.addColorStop(0.65,'#87CEEB');sky.addColorStop(1,'#c8f0c0');
  ctx.fillStyle=sky;ctx.fillRect(0,0,CW,CH);
  clouds.forEach(c=>{
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();
    ctx.ellipse(c.x,c.y,c.w*.5,c.w*.28,0,0,Math.PI*2);
    ctx.ellipse(c.x-c.w*.2,c.y+c.w*.06,c.w*.3,c.w*.2,0,0,Math.PI*2);
    ctx.ellipse(c.x+c.w*.22,c.y+c.w*.06,c.w*.27,c.w*.19,0,0,Math.PI*2);ctx.fill();
  });
  pipes.forEach(p=>{
    const g=ctx.createLinearGradient(p.x,0,p.x+PW(),0);
    g.addColorStop(0,'#3a7d44');g.addColorStop(0.45,'#52b056');g.addColorStop(1,'#2d6e36');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.roundRect(p.x,0,PW(),p.tH,[0,0,5,5]);ctx.fill();
    ctx.fillStyle='#4a9e4e';
    ctx.beginPath();ctx.roundRect(p.x-5*scale,p.tH-16*scale,PW()+10*scale,18*scale,4);ctx.fill();
    const boty=p.tH+PG();
    ctx.fillStyle=g;
    ctx.beginPath();ctx.roundRect(p.x,boty,PW(),CH-boty-GH(),[5,5,0,0]);ctx.fill();
    ctx.fillStyle='#4a9e4e';
    ctx.beginPath();ctx.roundRect(p.x-5*scale,boty-2*scale,PW()+10*scale,18*scale,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(p.x+5*scale,0,7*scale,p.tH);
    ctx.fillRect(p.x+5*scale,boty,7*scale,CH-boty-GH());
  });
  const gr=ctx.createLinearGradient(0,CH-GH(),0,CH);
  gr.addColorStop(0,'#8BC34A');gr.addColorStop(0.28,'#689F38');
  gr.addColorStop(0.29,'#795548');gr.addColorStop(1,'#5D4037');
  ctx.fillStyle=gr;ctx.fillRect(0,CH-GH(),CW,GH());
  ctx.strokeStyle='#6abf33';ctx.lineWidth=2*scale;
  ctx.beginPath();ctx.moveTo(0,CH-GH());ctx.lineTo(CW,CH-GH());ctx.stroke();
  ctx.save();
  const bx=BX()+BS()/2,by2=bY+BS()/2;
  ctx.translate(bx,by2);ctx.rotate(bR*Math.PI/180);
  ctx.font=`${BS()}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=5;
  ctx.fillText(fr%8<4?'🐦':'🦅',0,0);ctx.restore();
  if(state==='idle'||state==='dead')overlay();
}
function overlay(){
  ctx.fillStyle='rgba(0,0,0,0.42)';ctx.fillRect(0,0,CW,CH);
  const dead=state==='dead';
  const bw=235*scale,bh=(dead?185:148)*scale;
  const bx=(CW-bw)/2,by=(CH-bh)/2;
  ctx.fillStyle='rgba(255,255,255,0.96)';
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,16*scale);ctx.fill();
  ctx.textAlign='center';ctx.shadowBlur=0;
  if(!dead){
    ctx.font=`${42*scale}px serif`;ctx.fillText('🐦',CW/2,by+46*scale);
    ctx.fillStyle='#1a1a2e';ctx.font=`bold ${17*scale}px Segoe UI`;ctx.fillText('FLOPPY BIRD',CW/2,by+72*scale);
    ctx.fillStyle='#666';ctx.font=`${11*scale}px Segoe UI`;ctx.fillText('পাইপের ফাঁক দিয়ে উড়ে যাও!',CW/2,by+90*scale);
    ctx.fillStyle='#ffd700';ctx.beginPath();ctx.roundRect(bx+28*scale,by+106*scale,bw-56*scale,28*scale,14*scale);ctx.fill();
    ctx.fillStyle='#1a1a2e';ctx.font=`bold ${12*scale}px Segoe UI`;ctx.fillText('TAP করো শুরু করতে ▶',CW/2,by+124*scale);
  }else{
    ctx.font=`${38*scale}px serif`;ctx.fillText('💥',CW/2,by+44*scale);
    ctx.fillStyle='#e53935';ctx.font=`bold ${19*scale}px Segoe UI`;ctx.fillText('GAME OVER!',CW/2,by+68*scale);
    ctx.fillStyle='#1a1a2e';ctx.font=`bold ${26*scale}px Segoe UI`;ctx.fillText(`${score} পয়েন্ট`,CW/2,by+100*scale);
    ctx.fillStyle=score>0&&score>=hi?'#ffa000':'#999';
    ctx.font=`${11*scale}px Segoe UI`;
    ctx.fillText(score>0&&score>=hi?'🏆 নতুন রেকর্ড!':`সর্বোচ্চ: ${hi} পয়েন্ট`,CW/2,by+118*scale);
    ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.roundRect(bx+28*scale,by+132*scale,bw-56*scale,28*scale,14*scale);ctx.fill();
    ctx.fillStyle='white';ctx.font=`bold ${12*scale}px Segoe UI`;ctx.fillText('আবার খেলো 🔄',CW/2,by+150*scale);
  }
}
init();draw();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
